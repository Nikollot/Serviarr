name: Build and Push Docker Image

# Déclenche l'action à chaque push sur la branche main
on:
  push:
    branches:
      - main # Si ta branche principale s'appelle 'master', remplace 'main' par 'master'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code de ton dépôt GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Lit la version dans version.json
      - name: Get version from version.json
        id: get_version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "La version trouvée est : $VERSION"

      # 3. Prépare l'environnement Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Se connecte à Docker Hub grâce à tes secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # 5. Construit et pousse l'image avec les deux tags (latest + version)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            nikollot/serviarr:latest
            nikollot/serviarr:${{ env.VERSION }}
